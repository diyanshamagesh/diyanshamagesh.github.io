
# Site Settings
locale                   : "en-US"
title                    : "Diyansha Magesh"
title_separator          : "-"
name                     : "Diyansha Magesh"
description              : "Psychology researcher specializing in neurodevelopmental disorders and adolescent mental health. UC Davis MIND Institute."
url                      : "https://diyanshamagesh.github.io"
baseurl                  : ""
repository               : "diyanshamagesh/diyanshamagesh.github.io"
teaser                   :
breadcrumbs              : false
words_per_minute         : 160

# SEO
google_site_verification :
bing_site_verification   :

# Social Sharing
og_image                 : "images/profile.png"

# Site Author (Sidebar)
author:
  name             : "Diyansha Magesh"
  avatar           : "images/profile.png"
  bio              : "Psychology researcher | UC Davis MIND Institute | Neurodevelopmental & adolescent mental health | PhD-track"
  location         : "Davis, CA"
  employer         : "UC Davis, MIND Institute"
  email            : "dmag@ucdavis.edu"
  uri              :
  linkedin         : "https://www.linkedin.com/in/diyansha-magesh-2451672b8/"
  github           : "diyanshamagesh"

# Reading Files
include:
  - .htaccess
  - _pages
collections:
  portfolio:
    output: true
    permalink: /:collection/:path/
  posts:
    output: true
    permalink: /:categories/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: America/Los_Angeles

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-include-cache

whitelist:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
